---
layout: default
---
<div class="container">
  <h1>{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  {% if page.tags %}
  <p class="post-tags">
    {% for tag in page.tags %}
      <a class="tag" href="{{ '/blog.html' | relative_url }}?tag={{ tag | slugify | uri_escape }}">{{ tag }}</a>
    {% endfor %}
  </p>
  {% endif %}
  {{ content }}
  <hr />
  <h3>Subscribe to Ordinary Analysis</h3>
  <iframe src="https://ordinaryanalysis.substack.com/embed" width="480" height="320" style="border: 1px solid #EEE; background: white" frameborder="0" scrolling="no"></iframe>
  {% include giscus.html %}
</div>
